<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-do Simples</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --accent: #2563eb;
      --text: #1f2937;
      --muted: #6b7280;
      --danger: #dc2626;
      --ok: #16a34a;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #dbeafe, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .todo-app {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 20px;
      border: 1px solid var(--border);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.6rem;
    }

    .add-task {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-add {
      background: var(--accent);
      color: white;
    }

    .btn-clear {
      background: #eef2ff;
      color: var(--accent);
      margin-top: 12px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: #fafafa;
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .task-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .btn-delete {
      background: #fee2e2;
      color: var(--danger);
      flex-shrink: 0;
    }

    .status {
      margin-top: 12px;
      font-size: 0.95rem;
      color: var(--ok);
    }
  </style>
</head>
<body>
  <main class="todo-app">
    <h1>✅ To-do</h1>

    <form class="add-task" id="todo-form">
      <input id="task-input" type="text" placeholder="Digite uma tarefa" required />
      <button class="btn-add" type="submit">Adicionar</button>
    </form>

    <ul id="task-list" aria-live="polite"></ul>

    <button class="btn-clear" id="clear-done" type="button">Remover concluídas</button>
    <p class="status" id="status">Nenhuma tarefa ainda.</p>
  </main>

  <script>
    const form = document.getElementById('todo-form');
    const input = document.getElementById('task-input');
    const list = document.getElementById('task-list');
    const clearDoneBtn = document.getElementById('clear-done');
    const status = document.getElementById('status');

    const tasks = [];

    function updateStatus() {
      const done = tasks.filter(task => task.done).length;
      if (tasks.length === 0) {
        status.textContent = 'Nenhuma tarefa ainda.';
      } else {
        status.textContent = `${done} de ${tasks.length} tarefa(s) concluída(s).`;
      }
    }

    function render() {
      list.innerHTML = '';

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = task.done ? 'done' : '';

        const left = document.createElement('div');
        left.className = 'task-left';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.done;
        checkbox.addEventListener('change', () => {
          tasks[index].done = checkbox.checked;
          render();
        });

        const text = document.createElement('span');
        text.className = 'task-text';
        text.textContent = task.text;

        left.append(checkbox, text);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn-delete';
        removeBtn.type = 'button';
        removeBtn.textContent = 'Excluir';
        removeBtn.addEventListener('click', () => {
          tasks.splice(index, 1);
          render();
        });

        li.append(left, removeBtn);
        list.appendChild(li);
      });

      updateStatus();
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      tasks.push({ text, done: false });
      input.value = '';
      input.focus();
      render();
    });

    clearDoneBtn.addEventListener('click', () => {
      const pending = tasks.filter(task => !task.done);
      tasks.length = 0;
      tasks.push(...pending);
      render();
    });
  </script>
</body>
</html>
